<div class="max-w-3xl mx-auto p-4 bg-white min-h-screen">
  
  <div *ngIf="isSubmitted" class="flex flex-col items-center justify-center h-64 text-center mt-10 p-8 border border-green-200 bg-green-50 rounded-lg">
    <h2 class="text-2xl font-bold text-green-700 mb-2">Order Received</h2>
    <p class="text-green-600 text-lg">Thank you, we will be in contact with you shortly.</p>
  </div>

  <div *ngIf="!isSubmitted">
    
    <div class="text-center mb-8 border-b pb-4">
      <img src="logo/logo.png" alt="Brand Logo" class="mx-auto mb-4 object-contain h-16">
      <h1 class="text-2xl font-bold text-gray-800">Purchase Order Form</h1>
    </div>

    <div class="mb-8">
      <h2 class="text-xl font-semibold mb-4 text-gray-700">Billing & Shipping Information</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" [(ngModel)]="customer.companyName" placeholder="Company Name" class="w-full p-2 border rounded focus:ring-2 focus:ring-gray-400 outline-none">
        <input type="text" [(ngModel)]="customer.contactName" placeholder="Contact Name" class="w-full p-2 border rounded focus:ring-2 focus:ring-gray-400 outline-none">
        <input type="email" [(ngModel)]="customer.email" placeholder="Email Address" class="w-full p-2 border rounded focus:ring-2 focus:ring-gray-400 outline-none">
        <input type="text" [(ngModel)]="customer.phone" placeholder="Phone Number" class="w-full p-2 border rounded focus:ring-2 focus:ring-gray-400 outline-none">
        
        <input type="text" [(ngModel)]="customer.city" placeholder="City" class="w-full p-2 border rounded focus:ring-2 focus:ring-gray-400 outline-none">
        <input type="text" [(ngModel)]="customer.country" placeholder="Country" class="w-full p-2 border rounded focus:ring-2 focus:ring-gray-400 outline-none">
        
        <textarea [(ngModel)]="customer.billingAddress" placeholder="Billing Address" class="w-full p-2 border rounded focus:ring-2 focus:ring-gray-400 outline-none"></textarea>
        <textarea [(ngModel)]="customer.shippingAddress" placeholder="Shipping Address" class="w-full p-2 border rounded focus:ring-2 focus:ring-gray-400 outline-none"></textarea>
      </div>
    </div>

    <div class="mb-8">
      <h2 class="text-xl font-semibold mb-4 text-gray-700">Select Products & Quantities</h2>
      
      <div *ngFor="let product of products" class="border-2 rounded-lg p-4 mb-6 transition-all" 
           [ngClass]="product.selected ? 'border-gray-800 bg-white shadow-md' : 'border-transparent bg-gray-50'">
        
        <div class="flex items-center">
          <input type="checkbox" [(ngModel)]="product.selected" class="w-6 h-6 mr-4 cursor-pointer accent-black rounded">
          
          <img [src]="product.imageUrl" [alt]="product.name" (click)="openImage(product.imageUrl)" 
               class="w-16 h-16 rounded object-cover mr-4 cursor-pointer hover:opacity-80 transition-opacity border border-gray-200 shadow-sm">
          
          <div>
            <h3 class="font-bold text-lg text-gray-800">{{ product.name }}</h3>
            <p class="text-gray-600">${{ product.price }}</p>
          </div>
        </div>

        <div *ngIf="product.selected" class="flex flex-wrap gap-3 mt-4 pt-4 border-t border-gray-200">
          <div *ngFor="let sizeOpt of product.sizes; let i = index" class="border rounded-md bg-white p-2 flex flex-col items-center w-24 shadow-sm border-gray-300">
            <span class="text-xs font-semibold text-gray-500 mb-2">Size {{ sizeOpt.size }}</span>
            <div class="flex items-center justify-between w-full px-1">
              <button (click)="updateQty(product, i, -1)" class="text-gray-600 bg-gray-100 hover:bg-gray-300 rounded-md w-7 h-7 flex items-center justify-center font-bold text-lg transition-colors">-</button>
              <span class="text-sm font-bold text-gray-800">{{ sizeOpt.quantity }}</span>
              <button (click)="updateQty(product, i, 1)" class="text-gray-600 bg-gray-100 hover:bg-gray-300 rounded-md w-7 h-7 flex items-center justify-center font-bold text-lg transition-colors">+</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="mb-6 p-6 bg-gray-100 rounded-lg flex justify-between items-center border border-gray-200">
      <span class="text-xl font-semibold text-gray-700">Estimated Total:</span>
      <span class="text-3xl font-bold text-gray-900">${{ orderTotal | number:'1.2-2' }}</span>
    </div>

    <button (click)="submitOrder()" [disabled]="isLoading" 
            class="w-full bg-black text-white font-bold py-4 rounded hover:bg-gray-800 transition disabled:bg-gray-400 disabled:cursor-not-allowed">
      {{ isLoading ? 'SENDING ORDER...' : 'SUBMIT PURCHASE ORDER' }}
    </button>
    
  </div>
</div>

<div *ngIf="selectedImage" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-80 p-4 backdrop-blur-sm" (click)="closeImage()">
  <div class="relative w-full max-w-lg flex justify-center">
    <button (click)="closeImage()" class="absolute -top-12 right-0 text-white text-4xl hover:text-gray-300 font-bold">&times;</button>
    <img [src]="selectedImage" (click)="$event.stopPropagation()" class="max-h-[80vh] max-w-full object-contain rounded-lg shadow-2xl border-4 border-white">
  </div>
</div>
